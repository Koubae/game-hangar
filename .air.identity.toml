root = "."
testdata_dir = "testdata"
tmp_dir = "tmp-air-identity"

[build]
args_bin = []
bin = "./tmp-air-identity/identity/main"
cmd = "go build -o ./tmp-air-identity/identity/main ./cmd/identity"
delay = 1000
include_dir = ["pkg", "cmd/identity", "internal/identity"]
include_ext = ["go", "tpl", "tmp-air-identityl", "html"]
exclude_dir = ["assets", "tmp-air-identity", "vendor", "testdata", "docker", "logs", "tests", "docs"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_file = []
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
app_port = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
